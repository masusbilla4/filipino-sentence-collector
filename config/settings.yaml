  daily_files: true
  google_sheets:
    enabled: true
    sheet_name: "Filipino Sentences"
    credentials_path: "credentials/service_account.json"


schedule:
  rss_interval_minutes: 60

logging:
  level: "INFO"
  file: "filipino_collector.log"
